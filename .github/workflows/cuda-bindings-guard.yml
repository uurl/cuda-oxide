---
name: cuda-bindings-guard

# crates/cuda-bindings is distributed under the NVIDIA Software License
# (LICENSE-NVIDIA) and cannot accept external contributions. This guard
# fails any PR whose commits touch crates/cuda-bindings/ unless every
# such commit is authored under an @nvidia.com identity and carries no
# non-NVIDIA Co-authored-by trailers.
#
# Author emails are self-reported by git, so the guard also asks GitHub
# whether each commit's signature is verified and emits a non-blocking
# warning when it is not. Requiring signatures outright would block
# contributors who do not sign commits, so deliberate impersonation of
# an @nvidia.com identity is left to maintainer review (see CODEOWNERS)
# rather than CI.
#
# The workflow deliberately has no `paths:` filter so it always reports
# a status and can be made a required check; PRs that do not touch the
# crate pass immediately.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nvidia-authorship-guard:
    name: cuda-bindings NVIDIA-authorship guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check authorship of commits touching crates/cuda-bindings
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          merge_base="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"
          commits="$(git log --no-merges --format='%H' \
              "${merge_base}..${HEAD_SHA}" -- crates/cuda-bindings/)"
          if [ -z "$commits" ]; then
              echo "OK: no commits touch crates/cuda-bindings."
              exit 0
          fi

          fail=0
          while read -r sha; do
              short="${sha:0:7}"
              author_name="$(git log -1 --format='%an' "$sha")"
              author_email="$(git log -1 --format='%ae' "$sha")"

              case "${author_email,,}" in
                  *@nvidia.com) ;;
                  *)
                      echo "::error::Commit ${short} by ${author_name} <${author_email}> touches crates/cuda-bindings/ but is not authored under an @nvidia.com identity."
                      fail=1
                      # Authorship already failed; the signature warning
                      # below would only add noise.
                      continue
                      ;;
              esac

              external_coauthors="$(git log -1 \
                  --format='%(trailers:key=Co-authored-by,valueonly)' "$sha" \
                  | grep -v '^[[:space:]]*$' \
                  | grep -ivE '<[^<>]*@nvidia\.com>[[:space:]]*$' || true)"
              if [ -n "$external_coauthors" ]; then
                  echo "::error::Commit ${short} touches crates/cuda-bindings/ and carries non-NVIDIA Co-authored-by trailers:"
                  echo "$external_coauthors"
                  fail=1
              fi

              # Advisory only: git author emails are self-reported, and a
              # GitHub-verified signature is the one signal that the
              # @nvidia.com identity above is real. Transient API errors
              # are treated the same as an unverified signature.
              if ! verification="$(gh api "repos/${REPO}/commits/${sha}" \
                  --jq '"\(.commit.verification.verified) \(.commit.verification.reason)"' \
                  2>/dev/null)"; then
                  verification='unknown api-lookup-failed'
              fi
              verified="${verification%% *}"
              reason="${verification#* }"
              if [ "$verified" != "true" ]; then
                  echo "::warning::Commit ${short} by ${author_name} <${author_email}> touches crates/cuda-bindings/ without a GitHub-verified signature (${reason}); the @nvidia.com author identity is taken on trust. Reviewers should confirm the author."
              fi
          done <<< "$commits"

          if [ "$fail" -ne 0 ]; then
              cat <<'MSG'

          crates/cuda-bindings is distributed under the NVIDIA Software
          License (LICENSE-NVIDIA) and cannot accept external
          contributions.

          External contributors: no action needed on your side. A
          maintainer will split the cuda-bindings portion out of this PR
          and land it separately under NVIDIA authorship; the rest of
          the PR is reviewed and merged as usual.

          Maintainers: re-land the cuda-bindings changes as your own
          commits, authored with your @nvidia.com email and without
          non-NVIDIA Co-authored-by trailers.
          MSG
              exit 1
          fi
          echo "OK: all commits touching crates/cuda-bindings are NVIDIA-authored."

[package]
name = "redux_minmax"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

# Mark as standalone crate (not part of parent workspace)
[workspace]

# This example demonstrates the single-instruction warp integer reductions
# `redux.sync.{min,max,and,or,xor}` (sm_80+). Build with:
#   cargo oxide run redux_minmax

[dependencies]
# Device-side intrinsics (warp::redux_sync_min_i32, _max_u32, _and, ...)
cuda-device = { path = "../../../cuda-device" }

# Host-side utilities (CudaKernel trait, etc.)
cuda-host = { path = "../../../cuda-host" }

# Host-side CUDA runtime
cuda-core = { path = "../../../cuda-core" }

[package]
name = "redux_sum"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

# Mark as standalone crate (not part of parent workspace)
[workspace]

# This example demonstrates the single-instruction warp sum reduction
# `redux.sync.add` (sm_80+). Build with:
#   cargo oxide run redux_sum

[dependencies]
# Device-side intrinsics (warp::redux_sync_add, lane_id, thread indexing)
cuda-device = { path = "../../../cuda-device" }

# Host-side utilities (CudaKernel trait, etc.)
cuda-host = { path = "../../../cuda-host" }

# Host-side CUDA runtime
cuda-core = { path = "../../../cuda-core" }

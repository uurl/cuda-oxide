[package]
name = "ref_operand_mul"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

# Mark as standalone crate (not part of parent workspace)
[workspace]

# Regression test for issue #133: trait-method calls whose `Output`
# associated type differs from the self type (`impl Mul for &Foo` with
# `type Output = Foo`). Build with:
#   cargo oxide run ref_operand_mul

[dependencies]
cuda-device = { path = "../../../cuda-device" }
cuda-host = { path = "../../../cuda-host" }
cuda-core = { path = "../../../cuda-core" }

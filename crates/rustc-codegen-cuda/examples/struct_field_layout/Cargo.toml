[package]
name = "struct_field_layout"
version = "0.1.0"
edition = "2024"
authors = ["Nihal Pasham <nihalp@nvidia.com>"]
license = "Apache-2.0"

# Mark as standalone crate (not part of parent workspace)
[workspace]

# End-to-end repro for issue #128: a repr(Rust) struct whose fields rustc
# reorders, with an interior-padded enum field. mir-lower's aggregate
# lowering must map declaration-order field indices onto the padded LLVM
# struct ({ {i8,i32}, [3 x i8], i64, i32, i32 }) without landing on the
# [N x i8] padding slots. Pre-fix this either failed lowering loudly or
# silently read the wrong field on the GPU.
# Run with:
#   cargo oxide run struct_field_layout

[dependencies]
cuda-device = { path = "../../../cuda-device" }
cuda-host = { path = "../../../cuda-host" }
cuda-core = { path = "../../../cuda-core" }

[package]
name = "toolchain_pairing_smoke"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

# Mark as standalone crate (not part of parent workspace)
[workspace]

# Repro for issue #150: opt (LLVM 22) emits sizeless llvm.lifetime.start/end
# intrinsics that an LLVM 21 llc (CUDA_OXIDE_LLC) rejects with
# "Intrinsic has incorrect argument type!".

[dependencies]
cuda-device = { path = "../../../cuda-device" }
cuda-host = { path = "../../../cuda-host" }
cuda-core = { path = "../../../cuda-core" }
